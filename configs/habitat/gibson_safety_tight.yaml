# Gibson Habitat — tighter reactive-safety knobs.
#
# PIB-Nav defaults (warn_m=0.60, near_m=0.35, arc=±27°, side_warn_m=0.40)
# were tuned for 5–7 m procedural rooms whose corridor widths are comparable
# to warn_m itself. In Gibson homes, corridor widths are typically 1.0–1.8 m,
# so warn_m=0.60 saturates (always true) and the wrapper loses steering
# authority. This variant halves the distance thresholds while boosting the
# side-sector push to account for Gibson's more complex geometry.
#
# Target: non-null paired ΔSR on the Gibson val split.
inherit: ./gibson.yaml

safety:
  near_m: 0.18                  # 0.35 * 0.5: emergency turn threshold
  warn_m: 0.30                  # 0.60 * 0.5: steering-correction threshold
  forward_arc_frac: 0.40        # narrower forward arc ≈ ±18° (was ±27°)
  row_frac: [0.3, 0.7]
  near_forward_frac: 0.50       # deeper v reduction when emergency triggers
  asym_tiebreak: 0.15
  side_warn_m: 0.20             # 0.40 * 0.5: side-sector proximity threshold
  side_w_gain: 0.9              # 0.6 → 0.9: stronger sideward push
  side_v_taper: 0.75            # 0.85 → 0.75: slightly more v reduction near walls
