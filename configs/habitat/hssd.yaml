# Habitat Synthetic Scenes Dataset (HSSD-200) overrides.
#
# HSSD homes are large, cluttered, and photorealistic. Expect:
#   * Longer paths → raise max_episode_steps and n_pairs_per_scene
#   * More semantically meaningful depth → a slightly larger encoder helps
#
# Scene download (inside the docker image, after HuggingFace token is set):
#   python -m habitat_sim.utils.datasets_download \
#       --uids hssd-hab --data-path data/scene_datasets
inherit: ./default.yaml

env:
  max_episode_steps: 750
  depth_max_m: 6.0
  goal_tol_m: 0.3

bev:
  range_m: 10.0
  latent_dim: 192

habitat:
  scene_dataset: "hssd"
  pairs_per_scene: 24
  samples_per_pair: 12
  agent_height_m: 1.25   # HSSD rooms have realistic ceilings

train:
  epochs_stage_a: 30
  epochs_stage_b: 30
  epochs_stage_c: 10

data:
  out_dir: "data/pib_nav_hssd"
