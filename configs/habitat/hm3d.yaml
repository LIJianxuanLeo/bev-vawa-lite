# HM3D PointNav v0.2 — Habitat (remote GPU) track with semantic input.
#
# HM3D (Habitat-Matterport-3D) is the official Habitat Challenge 2021+
# PointNav benchmark. Unlike Gibson-4+, HM3D val ships with per-scene
# panoptic semantic annotations (``*_semantic.glb`` files), so we can
# turn on:
#
#   env.use_semantic: true    — activates the semantic sensor
#   bev.use_semantic: true    — activates the encoder semantic branch
#   wa.enable_coll_head: true — activates the learned collision head
#
# Data download (one-time, on the remote box):
#
#   HP=/root/miniconda3/envs/habitat/bin
#   $HP/python -m habitat_sim.utils.datasets_download \
#       --uids hm3d_val_habitat_v0.2 hm3d_val_semantic_annots_v0.2 \
#              hm3d_minival_habitat_v0.2 hm3d_minival_semantic_annots_v0.2 \
#              pointnav_hm3d_v1 \
#       --data-path /root/data
#
# Expected layout after download:
#   /root/data/scene_datasets/hm3d/val/00800-TEEsavR23oF/TEEsavR23oF.glb
#   /root/data/scene_datasets/hm3d/val/00800-TEEsavR23oF/TEEsavR23oF.semantic.glb
#   /root/data/datasets/pointnav/hm3d/v1/val/val.json.gz
#
# Expected GPU cost: ~30 min data-gen (20 val scenes) + 3 min train +
# ~7 min 4-seed paired eval = ~¥1.3 for the full HM3D supplementary run.

inherit: ./default.yaml

seed: 42

dataset:
  name: hm3d
  scene_dir: data/scene_datasets/hm3d
  episode_dir: data/datasets/pointnav/hm3d/v1
  split: val

env:
  depth_wh: [128, 128]
  depth_fov_deg: 90
  depth_max_m: 5.0
  goal_tol_m: 0.25
  max_episode_steps: 500
  # Discrete action interface (see gibson.yaml for rationale)
  discrete_actions: true
  discrete_forward_m: 0.25
  discrete_turn_deg: 10.0
  # Semantic sensor ON
  use_semantic: true
  semantic_classes: 16

bev:
  grid_size: 64
  latent_dim: 128
  cnn_channels: [32, 64, 96]
  recurrent: "lstm"
  range: [0.0, 3.0, -1.5, 1.5]
  fov_deg: 90
  depth_max_m: 5.0
  channels_enabled: [1, 1, 1]
  goal_sector_sigma_rad: 0.35
  # Semantic branch ON
  use_semantic: true
  semantic_classes: 16
  semantic_feat_dim: 64

wa:
  rollout_horizon: 3
  waypoint_embed_dim: 16
  ensemble: 3
  enable_dyn: true
  enable_deadend: true
  lambda_dyn: 0.5
  lambda_deadend: 0.5
  # Learned collision head ON
  enable_coll_head: true
  lambda_coll_head: 0.3

fusion:
  alpha: 1.0
  beta:  1.5
  gamma: 2.5
  delta: 0.5
  eta:   1.0
  mu:    1.5

train:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-5
  epochs_stage_a: 20
  epochs_stage_b: 20
  epochs_stage_c: 8
  grad_clip: 1.0
  num_workers: 8

gibson:
  # Reused as the data-gen parameter block (the rollout script does not
  # actually require the Gibson dataset to be named "gibson").
  samples_per_episode: 16
  rollout_horizon: 3
  max_episodes_per_scene: null
  scene_limit: null

data:
  out_dir: "data/hm3d_pointnav_v1_shards"

habitat:
  agent_height_m: 0.88
  gpu_device_id: 0
  scene_dataset: "hm3d"

eval:
  n_episodes: 100
  results_dir: "results"
