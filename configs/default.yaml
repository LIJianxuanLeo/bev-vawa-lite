# Default experiment config for BEV-VAWA-Lite (local PIB-Nav, MuJoCo).
seed: 42

env:
  room_size_m: [5.0, 7.0]   # uniform range
  n_obstacles: [3, 6]
  obstacle_size_m: [0.4, 1.2]
  wall_height_m: 0.8
  robot_radius_m: 0.20
  max_lin_vel: 0.4
  max_ang_vel: 1.2
  control_dt: 0.1
  depth_wh: [128, 128]
  depth_fov_deg: 90
  depth_max_m: 3.0
  occupancy_cell_m: 0.05
  goal_tol_m: 0.25
  max_collisions: 10
  max_episode_steps: 300

# Geometric multi-channel BEV (occ + free + goal-prior). ``channels_enabled``
# gates the three channels at lift time for ablations.
bev:
  grid_size: 64
  range: [0.0, 3.0, -1.5, 1.5]   # (x_min, x_max, y_min, y_max) in meters
  fov_deg: 90
  depth_max_m: 3.0
  latent_dim: 128
  cnn_channels: [32, 64, 96]
  recurrent: "lstm"              # lstm is faster than gru on mps
  channels_enabled: [1, 1, 1]
  goal_sector_sigma_rad: 0.35

va:
  n_candidates: 5
  waypoint_horizon_m: 1.5

wa:
  rollout_horizon: 3
  waypoint_embed_dim: 16
  ensemble: 3                    # for uncertainty estimate
  enable_dyn: true               # L_dyn: align rollout latents to encoder futures
  enable_deadend: true           # L_deadend: per-candidate reachability BCE
  lambda_dyn: 0.5
  lambda_deadend: 0.5

fusion:
  alpha: 1.0                     # policy score
  beta: 1.5                      # progress
  gamma: 2.0                     # risk
  delta: 0.5                     # uncertainty
  eta: 1.0                       # dead-end penalty

train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-5
  epochs_stage_a: 20
  epochs_stage_b: 20
  epochs_stage_c: 8
  grad_clip: 1.0
  num_workers: 0                 # keep low on MPS

data:
  n_rooms: 1000
  samples_per_room: 64
  out_dir: "data/pib_nav"

eval:
  n_episodes: 100
  results_dir: "results"

# Reactive obstacle-avoidance override applied on top of any learned policy
# when scripts/eval.py is run with ``--safety``. Read by policies.wrap_safety.
# v3 — APF on forward arc + lateral-sector scrape guard.
safety:
  near_m: 0.35                 # d_min < this → strong turn + tapered v (never zero)
  warn_m: 0.60                 # d_min < this → additive steering correction
  forward_arc_frac: 0.60       # middle 60% cols = ±27° at FOV=90°
  row_frac: [0.3, 0.7]         # vertical crop to skip floor / ceiling noise
  near_forward_frac: 0.30      # v' = max_v * this when d_min < near_m
  asym_tiebreak: 0.15          # |asym| below this → fall back to policy ω sign
  # v3 side-sector scrape guard — outer 20% cols each side (±27°..±45°)
  side_warn_m: 0.40            # side clearance < this → push away from that side
  side_w_gain: 0.6             # side ω correction strength (× max_ang_vel)
  side_v_taper: 0.85           # v multiplier when a side is fully close (pinch points)
